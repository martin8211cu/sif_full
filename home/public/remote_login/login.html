<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        /* Full-width input fields */
        
        input[type=text],
        input[type=password] {
            width: 100%;
            padding: 12px 20px;
            margin: 8px 0;
            display: inline-block;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        /* Set a style for all buttons */
        
        button {
            background-color: #4CAF50;
            color: white;
            padding: 14px 20px;
            margin: 8px 0;
            border: none;
            cursor: pointer;
            width: 100%;
        }
        
        button:hover {
            opacity: 0.8;
        }
        /* Extra styles for the cancel button */
        
        .cancelbtn {
            width: auto;
            padding: 10px 18px;
            background-color: #f44336;
        }
        /* Center the image and position the close button */
        
        .imgcontainer {
            text-align: center;
            margin: 24px 0 12px 0;
            position: relative;
        }
        
        img.avatar {
            width: 40%;
            border-radius: 50%;
        }
        
        .container {
            padding: 16px;
        }
        
        span.psw {
            float: right;
            padding-top: 16px;
        }
        /* The Modal (background) */
        
        .modal {
            /* display: none; */
            /* Hidden by default */
            position: fixed;
            /* Stay in place */
            z-index: 1;
            /* Sit on top */
            left: 0;
            top: 0;
            width: 100%;
            /* Full width */
            height: 100%;
            /* Full height */
            overflow: auto;
            /* Enable scroll if needed */
            background-color: rgb(0, 0, 0);
            /* Fallback color */
            background-color: rgba(0, 0, 0, 0.4);
            /* Black w/ opacity */
            /* padding-top: 60px; */
        }
        /* Modal Content/Box */
        
        .modal-content {
            background-color: #fefefe;
            margin: 1% auto 1% auto;
            /* 5% from the top, 15% from the bottom and centered */
            border: 1px solid #888;
            width: 80%;
            /* Could be more or less, depending on screen size */
        }
        /* The Close Button (x) */
        
        .close {
            position: absolute;
            right: 25px;
            top: 0;
            color: #000;
            font-size: 35px;
            font-weight: bold;
        }
        
        .close:hover,
        .close:focus {
            color: red;
            cursor: pointer;
        }
        /* Add Zoom Animation */
        
        .animate {
            -webkit-animation: animatezoom 0.6s;
            animation: animatezoom 0.6s
        }
        
        @-webkit-keyframes animatezoom {
            from {
                -webkit-transform: scale(0)
            }
            to {
                -webkit-transform: scale(1)
            }
        }
        
        @keyframes animatezoom {
            from {
                transform: scale(0)
            }
            to {
                transform: scale(1)
            }
        }
        /* Change styles for span and cancel button on extra small screens */
        
        @media screen and (max-width: 300px) {
            span.psw {
                display: block;
                float: none;
            }
            .cancelbtn {
                width: 100%;
            }
        }
    </style>

    <script src="https://code.jquery.com/jquery-2.2.4.min.js" integrity="sha256-BbhdlvQf/xTY9gja0Dq3HiwQF8LaCRTXxZKRutelT44=" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
    <script>
        $(document).ready(function() {

            $('#login').click(function() {
                var emp = $("#company").val();
                var username = $("#username").val();
                var password = $("#password").val();

                if ($.trim(username).length > 0 && $.trim(password).length > 0) {
                    $.ajax({
                        type: "POST",
                        url: "/cfmx/siah/api/index.cfm?endpoint=/login",
                        data: {
                            "company": emp,
                            "username": username,
                            "password": password
                        },
                        cache: false,
                        beforeSend: function() {
                            $("#login").val('Espere...');
                        },
                        success: function(data) {
                            if (data) {
                                window.opener.postMessage(data, '*');
                                window.close();
                            } else {
                                //Shake animation effect.
                                /* $('#box').shake(); */
                                $("#login").val('Login')
                                $("#error").html("<span style='color:#cc0000'>Error:</span> Usuario/Contrase&ntilde;a invalido(s)");
                            }
                        },
                        error: function() {
                            /* $('#box').shake(); */
                            $("#login").val('Login')
                            $("#error").html("<span style='color:#cc0000'>Error:</span> Usuario/Contrase&ntilde;a invalido(s)");
                        }
                    });

                }
                return false;
            });

        });
    </script>
    <script>
        window.onbeforeunload = function() {
            window.opener.postMessage('closed', 'http://localhost:8500');
        };
    </script>
</head>

<body>
    <div id="box" class="modal">
        <form class="modal-content animate">
            <div class="container">
                <label for="company"><b>Empresa</b></label>
                <input type="text" placeholder="Empresa" name="company" id="company" required>

                <label for="username"><b>Usuario</b></label>
                <input type="text" placeholder="Usuario" name="username" id="username" required>

                <label for="psw"><b>Contrase&ntilde;a</b></label>
                <input type="password" placeholder="Contrase&ntilde;a" name="password" id="password" required>

                <button type="submit" id="login">Entrar</button>
                <label>
                    <input type="checkbox" checked="checked" name="remember"> Recordarme
                </label>
                <div id="error"></div>
            </div>

            <div class="container" style="background-color:#f1f1f1">
                <button type="button" onclick="window.close();" class="cancelbtn">Cancelar</button>
                <!-- <span class="psw">Forgot <a href="#">password?</a></span> -->
            </div>
        </form>
    </div>
</body>

</html>
