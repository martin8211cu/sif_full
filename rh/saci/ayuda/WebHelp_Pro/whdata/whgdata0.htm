<script language="javascript">
<!--
 aGE("Ajuste a depósito de garantía","Es un monto o cantidad de dinero expresado en la moneda del producto complementario al depósito de garantía actual.  Puede surgir por aspectos en el comercialización o configuración de la incidencia del producto o en a definición de depósitos previos.");
 aGE("Apdo Postal","Corresponde al apartado o casillero postal particular, asociado a una dirección postal, es un campo opcional, que tiene sentido como complemento del código postal.");
 aGE("Apellido","Es el primer apellido o apellido de familia de una persona física nacional o extranjera.  Su uso es oblitorio para las personas físicas, para el caso de personas jurídicas no será desplegado ni validado.");
 aGE("Apellido 2","Es el segundo apellido (apellido materno en el caso de Costa Rica, o apellido de soltera) de una persona física, no se captura ni despliega en el caso de una persona jurídica y no se valida en al caso de un extranjero.");
 aGE("Apertura de cuenta","Es la fecha del sistema en el momento en que la cuenta es registrada. Puede ser referenciada como fecha de apertura. Se almacena internamente hasta segundos aunque su despliegue regular es hasta el día. Asignada por el sistema sin posibilidad de edición.");
 aGE("Aplica a","Indicador del ámbito de acción de una razón de bloqueo, indicando si esta apliaca a servicios sin y con compromiso.");
 aGE("Aplicación del atributo extendido","Es una relación con todas las entidades susceptibles a ser complementadas con los atributos extendidos, de la cual es elegido mediante una marca aquella para la que aplique el atributo actual.  Las entidades elegidas con la marca incluirán esta relación en su formulario de registro.");
 aGE("Atención a","Es un campo texto no estructurado que permite almacenar nominativo de referencia para efectos de contacto a terceros o comunicaciones enviadas.");
 aGE("Autogestión","Indicador binario que indica si el concepto indicado en este ítem puede ser utilizado o no en el proceso de autogestión.");
 aGE("Barrio","Es un nombre no estructurado que permite definir claramente la dirección declarada de la persona, ubicando precisamente la dirección de la misma en un localidad y precisando la dirección de esta.");
 aGE("Cliente","Un cliente es un persona cualquiera que tenga asociadas cuentas y las estructuras asociadas a estas. Aunque en el proceso normal de de las operaciones de la empresa algunas cuentas son asignadas con propósitos no comerciales, para efectos prácticos estas personas también son consideradas clientes.");
 aGE("Código de Actividad Económica","Es un identificador para cada actividad económica utilizada la segmentación de las entidades del aplicativo.  Es una código único definido internamente por la empresa que facilita la integración de otros sistemas con este. No permite valores nulos.");
 aGE("Código de Clase de cuenta","Es el valor que identifica de forma única cada clasificación y es determinado por la empresa para efectos de integración con otros sistemas y procesos.");
 aGE("Código de Grupo de Cobro","Es el valor que identifica de forma única cada grupo de cobro. Es determinado por la empresa para efectos de integración con otros sistemas y procesos de gestión administrativa.");
 aGE("Código de localidad","Corresponde a la numeración o código oficial que identifica cada localidad de forma única en el país.  Corresponde a un valor alfanumérico independiente a partir del cual se relacionan los niveles superiores e inferiores de la estructura de localidades definida, usualmente la codificación de los niveles inferiores concatenan la codificación de los anteriores o sus padres.");
 aGE("Código de motivo de retiro","Es el valor que identifica de forma única cada motivo de Retiro. Es determinado por la empresa para efectos de integración con otros sistemas y procesos de gestión administrativa.");
 aGE("Código de Producto","Identifica de forma única cada producto o paquete en la empresa. A partir de este código se garantiza además su integración con otros sistemas.  Corresponde con un código alfanumérico que no permite valores nulos.");
 aGE("Código de razón de bloqueo","Es una código de uso interno para la sincronización de las razones de bloqueo con otras aplicaciones de la empresa.");
 aGE("Código de Servicio","Identificación de cada servicio particular en el sistema.  Es un catálogo general de la empresa que sincroniza los procesos externos a los sistemas. Es un valor alfanumérico único que no permite valores nulos.");
 aGE("Comercializable","Indicador que permite clasificar los paquetes entre aquellos comerciales y otros definidos únicamente para efectos de la integración con otros sistemas internos de la empresa y por ende no disponibles para su venta o uso por terceros  llamados de \"Interfaz\".  Es un valor booleano (de dos estados) donde una marca equivale a \"Comercializable\" y la ausencia de la misma equivale a \"Interfaz\".");
 aGE("Compromiso","Indicador que establece si el producto es de compromiso o no, siendo la diferencia básicamente la formalización de un contrato y una garantía previa.  Es un campo booleano (de dos estados) donde la marca significa \"SI\".");
 aGE("Correos","Cantidad de cuentas de correo.  Número entero mayor o igual a cero que indica cuantas cuentas de correo puede accesar un producto.");
 aGE("Cuota de correo","Es la cuota máxima límite para e almacenamiento de correos electrónicos expresada en Kilobytes.  Es un valor numérico mayor a cero que permite valores nulos.");
 aGE("Custodio","Referirse a responsable");
 aGE("Depósito de garantía","Agrupa todos los datos básicos de captura de un depósito de garantía, como su tipo, entidad bancaria, monto,  moneda, vencimiento y custodio.");
 aGE("Descripción de la inconsistencia","Es un texto en lenguaje no estructurado, que explica y detalla en resumen  el tipo de inconsistencia, utilizado para efectos de ayuda y como complemento del nombre para su entendimiento o manejo por parte del usuario.");
 aGE("Descripción de Producto","Es un texto en lenguaje no estructurado, que explica y detalla en resumen  la funcionalidad básica o alcance de cada producto, utilizado para efectos de ayuda y como complemento del nombre del producto para su entendimiento o manejo por parte del usuario.");
 aGE("Descripción de Servicio","Es un texto en lenguaje no estructurado, que explica la funcionalidad básica de cada servicio, utilizado para efectos de ayuda y como complemento del nombre del servicio.");
 aGE("Descripción del Atributo","Texto que define el uso e interpretación del Atributo Extendido com mayor detalle que su etiqueta.  Se utiliza para la administración del mismo y como ayuda inmediata en el proceso de captura donde esta suceda.  En su captura se valida que no contenga valores nulos.");
 aGE("Devolución de depósito","Es un indicador que identificará cuando el evento de retiro de un paquete conlleva la devolución del depósito de garantía asociado.");
 aGE("Día de la semana","Referencia a un catálogo preestablecido con los días de la semana establecidos ordinalmente desde el domingo, hasta el sábado.  Su captura se valida contra los valores de esta lista.");
 aGE("Dirección","Se refiere al detalle de la dirección del domicilio declarado de una persona, es una información descriptiva no estructurada pero que no puede contener valores nulos.  Se complementa con el campo Barrio que es la ubicación conocida dentro del último nivel de la localidad.");
 aGE("Dirección IP","Es una dirección de red codificada en el protocolo de acceso a Internet. corresponde a diversos segmentos separados usualmente por un punto e identificados por  números que son significativos en relación a su posición.  Establece un punto de conexión único en la red en un momento determinado.");
 aGE("División política","La división política es el nombre de cada nivel de la definición de la estructura multinivel en que se divide geográficamente un país. Cada nivel contiene o está contenido en otro jerárquicamente.");
 aGE("Duración","Número de segundos contínuos de un evento en los sistemas de gestión de red, reportado por estos en cada conexión.");
 aGE("E-mail","Es una cuenta de correo electrónico.  Puede contener valores nulos.  Se valida de la siguiente forma \"str1@str2\" donde además se revisa que \"str2\" contenga al menos un \".\" ni en la primera ni última posición.");
 aGE("E-mail de aplicación","Es una cuenta de correo electrónico para la recepción del archivo de resultados de la aplicación del archivo de facturación desde una compańía mediática.  No puede contener valores nulos.  Se valida de la siguiente forma \"str1@str2\" donde además se revisa que \"str2\" contenga al menos un \".\" ni en la primera ni última posición.");
 aGE("E-mail de envío","Es una cuenta de correo electrónico para el envío del archivo de facturación a una compańía mediática.  No puede contener valores nulos.  Se valida de la siguiente forma \"str1@str2\" donde además se revisa que \"str2\" contenga al menos un \".\" ni en la primera ni última posición.");
 aGE("Envío de copia","Es un indicador que establece el tipo de envío de copia de la documentación formal al dueńo de una cuenta .  Corresponde con una lista preestablecida con valores que permiten además validar su ingreso.");
 aGE("Estado de la inconsistencia","Es un clasificador de la situación actual de la ocurrencia de una inconsistencia en el proceso de aprobación de una cuenta. Corresponde a un indicador binario que indica si la inconsisencia está resuelta o no.");
 aGE("Estado de la razón de bloqueo","Indica el estado de la razón de bloqueo para efectos de su administración.");
 aGE("Estado de la venta","Es un indicador visual del estado de una venta realizada según las etapas de gestión de la misma.  Así cuando una venta se realiza esta queda pendiente hasta que la empresa la acepte o rechace, teniendo los estados de pendiente, aprobada y rechazada respectivamente.");
 aGE("Estado del prepago","Es un clasificador de la situación actual de un instrumento de prepago en la empresa. Corresponde a una lista de valores preestablecida y la validación de su captura se realiza contra esta.  Los cambios de estado de un instrumento de prepago pueden ocurrir por proceso masivo o particular en la operación de cada uno.");
 aGE("Estado del sobre","Establece la situación actual de un sobre de acceso determinado, indicando si el mismo es vigente o no.");
 aGE("Etiqueta","Identifica y nombra en lenguaje natural, cada Atributo Extendido, constituyendo además el nombre de éste.  Se utiliza como etiqueta en la captura de los valores de referencia en las entidades correspondientes. Se valida que esta etiqueta tenga una longitud mínima de una posición.");
 aGE("Fax","Es el número telefónico correspondiente a un fax, se valida contra el formato telefónico parametrizado para la empresa.  Puede aceptar valores nulos.");
 aGE("Fecha","Fecha que determina la fecha real de un documento, evento o registro ingresado en el sistema. Captura y despliega su contenido con el formato dd/mm/aa.");
 aGE("Fecha cese","Fecha que establece inclusivamente el final de un período durante el cual el registro está activo. Captura el valor en el formato dd/mm/aa.  Este campo se complementa con el campo Fecha inicio.");
 aGE("Fecha inicio","Fecha que establece inclusivamente el inicio de un período durante el cual el registro está activo. Captura el valor en el formato dd/mm/aa.  Este campo se complementa con el campo Fecha cese.");
 aGE("Forma de cobro","Es un indicadro de la forma en que se cobrará por la cuenta al cliente.");
 aGE("Grupo de logines","Es una lista de selección con los logines relacionados en el contexto donde se solicite, incluyendo además la opción de elegir todos ellos.");
 aGE("Habilitado","Indicador del estado de un registro, determina si este puede ser utilizado o no, corresponde a un \"borrado lógico\" temporal ya que físicamente no desaparece el registro ni las referencias al mismo solo se inhabilita la posibilidad de crear nuevas. Su caracter de temporalidad indica que este estado puede variar en el tiempo en relación a los requerimientos de la empresa.  Para efectos de la extracción de información y consultas de los datos relacionados no hay diferencia relativa al valor del Estado.");
 aGE("Hora desde","Es una hora a partir de la cual se establece un período de tiempo incluyendo esta hora en el período.  Se captura en formato de 24 horas, separando las horas (00-24) de los minutos (00-59) por el caracter \":\".");
 aGE("Hora hasta","Es la hora hasta la cual se establece un período de tiempo excluyendo ésta del período establecido, es decir 13:00 establece el fin del período en 12:59.  Se captura en formato de 24 horas, separando las horas (00-24) de los minutos (00-59) por el caracter \":\".");
 aGE("Horas básicas","Es el número de horas de conexión que incluye el producto en su tarifa básica.  Es un valor numérico mayor o igual a cero que no admite valores nulos.");
 aGE("Identificación de Persona","Cédula o número de identificación única de la persona, cuyo formato y validación dependerá la personería asignada a la misma.  Esta identificación trasciende al aplicativo y a la empresa, y corresponde a la identificación oficial del país.");
 aGE("Incidencias del servicio","Cantidad máxima de incidencias de un servicio particular en un producto o paquete.  Es un número entero mayor o igual a cero, validado cuando se habilite en la lista.");
 aGE("Indicador de prospectación","Es una marca que define si el Agente Autorizado actual atiende o no prospectos.  Si el indicador está marcado el Agente Autorizado se habilita para el proceso de asignación de prospectos, el cual podría asignarle cualquier prospecto en ese período.  Esta marca no implica en sí la asignación de prospectos, esta depende del proceso de asignación automática y los criterios definidos en este.");
 aGE("Instrucción de configuración de Servicio","Es el comando, desde la perspectiva técnica, utilizado en la configuración particular del servicio.");
 aGE("Localidad atendida","Es una estructura multinivel que almacena la división geográfico-política de la región donde la empresa ofrece sus productos y servicios. Los niveles de esta estructura dependen del país elegido.  La selección puede realizarse a cualquier nivel, cuando el nivel elegido no sea el último se asumirá la selección integral de todos los niveles inferiores al elegido.  Los valores de esta estructura serán validados contra los definidos en el catálogo de localidades.");
 aGE("Localidad padre","Es el referencia al elemento de nivel superior en la división política, al que pertenece una localidad.  De ser el primer nivel de la estructura este valor será \"nulo\" y se desplegará la palabra reservada \"Ninguno\" en su descripción.  Es un campo no editable sino heredado de la ubicación dse la localidad en su definición, corresponde físicamente a otro código de localidad que referencia a otro elemento dentro de la misma estructura.  El descriptor de la estructura de localidades depende del País.");
 aGE("Login","Es el nombre de login o usuario que se quisiera para acceder un servicio particular.  Un mismo login puede tener diferentes servicios asociados aunque solo una incidencia de cada uno. En el caso de un instrumento de prepago el login está preestablecido con un nombre genérico y se asocia el servicio de acceso únicamente. Cada login debe ser único para cualquier otro login en la empresa.  No acepta nulos.");
 aGE("Logo","Es una imagen asociada a un registro que permite desplegar gráficamente su contenido en las consultas indicadas sobre este.");
 aGE("Mecanismo de envío","Establece la forma de envío de documentqación por el agrupamiento de los campos involucrados así como las copias de esta. Dependiendo del tipo de envío agrupa los campos, así si corresponde a un apartado postal, agrupa: Apartado y Oficina Postal, de enviar a una dirección física despliega esta junto con el barrio y la localidad de referencia; las copias son una relación de cuentas de correo o fax donde se enviará una copia de la documentación.");
 aGE("Medio","Es el identificador que hace las veces de login en el caso de acceso a los servicios a través de un tercero que provee el medio de conexión, por ejemplo el servicio 900 telefónico, cableras, etc.  Este identificador provee además el nexo para efectos de la facturación de los servicios a la empresa intermediaria.");
 aGE("Monto","Un monto es una cantidad de dinero, expresado en la moneda indicada o contextual al formulario.  Corresponde a un valor numérico mayor o igual a cero con dos decimales.");
 aGE("Monto de comisión","Es el monto a pagar en cada ocurrencia de comisiones, se expresa en moneda local y se valida como un valor numérico positivo de hasta dos posiciones decimales.");
 aGE("Nombre de Actividad Económica","Nombre de cada Actividad Económica en el sistema, Cada usuario utilizará esta para la identificación e interpretación de la misma. El valor de este campo describe cada Actividad económica sin permitir valores nulos.");
 aGE("Nombre de Clase de Cuenta","Nombre de cada clasificación codificada para su uso por parte del usuario del sistema. . El valor de este campo describe cada Clase de Cuenta sin permitir valores nulos.");
 aGE("Nombre de Compańía de Medios","Nombre que identifica cada Compańía de Medios en lenguaje conocido por parte del usuario del sistema. No permite valores nulos.  Debe corresponder al nombre comercial de la compańía externa a la empresa.");
 aGE("Nombre de Grupo de Cobro","Nombre de cada Grupo de Cobro codificado, para su uso por parte del usuario del sistema. . El valor de este campo describe cada Grupo de Cobro sin permitir valores nulos.");
 aGE("Nombre de inconsistencia","Nombre de cada Tipo de Inconsistencia codificada para su uso por parte del usuario del sistema en el proceso de aprobación. El valor de este campo identifica cada inconsistencia sin permitir valores nulos.");
 aGE("Nombre de localidad","Nombre geográfico oficial de la localidad, sin importar el nivel de la división política de la que se trate. Es un valor cuya longitud no puede ser menor a un caracter.  La identificación de una localidad a partir de su nombre es vital para el proceso atencional.");
 aGE("Nombre de Motivo de Retiro","Identificador en lenguaje natural del motivo de retiro de un servicio, justificando el mimso a nivel de login.  Se indica de forma concisa la razón del mismo.  Este campo acepta texto no estructurado y no permite el ingrso de valores nulos.");
 aGE("Nombre de Persona","Es el nombre completo de una persona física o el nombre comercial de una persona jurídica, En el caso de una persona física está compuesto del nombre de pila y apellidos utilizados, pudiendo omitir el segundo en el caso de un extranjero.  Este campo es compuesto y su uso se restringe a la presentación del mismo, siendo la validación en cada uno de los campos componentes. En caso de formar parte de un filtro se buscará la ocurrencia de su captura en cualquiera de los campos componentes.");
 aGE("Nombre de Pila","Es el nombre dado de un persona física o bien el nombre comercial de una empresa (Existe un campo adicional para la razón social de una persona jurídica).  No puede contener valores nulos.");
 aGE("Nombre de Producto","Nombre Comercial oficial de los productos o paquetes de la empresa, identifica de forma única cada producto para efectos de comercialización. Es un valor cuya longitud no puede ser menor a un caracter.  La identificación de un producto a partir de su nombre es vital para el proceso atencional.");
 aGE("Nombre de Servicio","Identifica de forma natural cada servicio catalogado en la empresa.  Es un campo alfanumérico que será utilizado por los usuarios para seleccionar un servicio en el sistema, no permite valores nulos.");
 aGE("Nombre de Tarifa","Nombre de cada Estructura Tarifaria para su uso por parte del usuario del sistema. No permite valores nulos.");
 aGE("Número de cuenta","Este es un número asignado internamente por la empresa en el proceso de aprobación de cuentas, al incluir una nueva cuenta aparece la leyenda “Por asignar” o bien el número asignado cuando se refiera a una cuenta existente.  Este campo no puede ser incluido ni modificado.");
 aGE("Número de sobre","Es el identificador público del sobre, impreso en la parte externa y visible del sobre por la entidad impresora. Este campo será importado y no es posible modifcar, establece la llave pública del sobre y las referencias al mismo.");
 aGE("Número de Sobre desde","En la definición de un paquete de sobres de acceso, determina de forma inclusiva el primer sobre.  El paquete se conformará de todos los sobres consecutivos hasta el \"Número de sobre Hasta\".");
 aGE("Número de Sobre hasta","En la definición de un paquete de sobres de acceso, determina de forma inclusiva el primer sobre.  El paquete se conformará de todos los sobres consecutivos hasta el \"Número de sobre Hasta\".");
 aGE("Observaciones","Es un texto no estructurado ni con funcionalidad específica en el sistema que permite agregar información u anotaciones relevantes de una entidad para efectos de desplegarla en consultas o alertar al lector de algún dato relevante.  Usualmente este campo está reservado para uso interno de los representantes de la empresa.  Puede contener valores nulos.");
 aGE("Ordenamiento del atributo extendido","Establece el ordenamiento relativo de los Atributos Extendidos entre sí.  Es un valor numérico que captura enteros, cuya precedencia es de menor a mayor.  Ya que todos los atributos no califican la misma entidad la conformación del orden en el formulario de captura se establece por el orden entre los elementos que apliquen, en caso de tener el mismo valor de ordenamiento la precedencia será alfabética por el valor de la etiqueta.  Este campo valida la inclusión números enteros.");
 aGE("Paquete","Es una referencia a la incidencia particular de un producto  a partir del nombre de este.");
 aGE("Paquete de prepago","Es el paquete que ampara la definición y configuración de una serie de prepagos.  Es un campo de consulta que no puede ser modificado particularmente para un instrumento.");
 aGE("Paquete interfaz","Es una referencia a la lista de selección de paquetes del tipo interfaz, utilizada por excepción cuando el Servicio es administrado internamente por otro paquete para otros sistemas (Ver indicador Interfaz).");
 aGE("Penalizada?","Es un indicador booleano que establece que ls incidencias de determinado tipo de inconsistencia deben ser penalizadas en el proceso de calificación de un Agente Autorizado.  Aquellas penalizadas serán incluidas como una incidencia negativa en la valoiración.");
 aGE("Personería","Clasificador del tipo de personería de una persona para su interpretación en el sistema, corresponde a una lista de valores preestablecidos.  Ninguna persona puede ser registrada sin su personería y esta determina el formato de su identificación y la validación de unicidad de la misma.");
 aGE("Plazo de entrega de la documentación","Es el número de días hábiles que tiene un Agente Autorizado para presentar la documentación relacionada a una venta. Inicalmente se sugiere un valor por omisión determinado por la empresa, sin embargo este valor puede ser cambiado para el manejo de excepciones y particularidades de cada Agente.  Se valida que el valor corresponda a un número entero positivo.");
 aGE("Política de redondeo","Define la regla de negocio para el redondeo de la duración de eventos en el tipo de tarifa, se compone de dos campos el primero una lista preestablecida indicando el criterio y el segundo la significancia del redondeo en segundos (que corresponden a la unidad elemental).");
 aGE("Porcentaje de comisión","Representa la relación de cálculo del importe de comisión con relación al monto del producto o servicio vendido. La ocurrencia de este campo dependerá de la selección de tipo de comisión para el Agente Autorizado, restringiendo esta al tipo \"Porcentual\". La captura se validará un valor numérico positivo con hasta dos decimales significativos.");
 aGE("Precio del prepago","Es el precio individual de cada instrumento de prepago en moneda local.  Es un campo de consulta que no puede ser variado particularmente.");
 aGE("Precio por hora excedente","Expresa el precio por hora excedente a cobrar a partir del consumo de las horas básicas en la moneda estipulada en el producto.  Es un valor numérico mayor o igual a cero que no admite valores nulos.");
 aGE("Prefijo de prepago","Es una palabra que serializa un conjunto de logines de prepago, antecediendo siempre al nombre de login relacionado con cada uno de ellos, luego de esta palabra se adjunta una nominación numeral consecutiva para cada instrumento particular.");
 aGE("Prepago","Es el login que se utiliza para acceder un servicio de prepago.  Este login está preestablecido con un nombre genérico y se asocia el servicio de acceso únicamente. Cada login debe ser único para cualquier otro login en la empresa.  No acepta nulos.");
 aGE("Prepago liquidado","Indicador que visualiza el estado de liquidación de un prepago, la liquidación es el proceso de cancelación de los prepagos en consignación, cuando estos se realicen mediante venta directa este campo estará marcado.  Es un campo de consulta que no puede ser modificado particularmente para un instrumento.");
 aGE("Primer uso del prepago","Fecha del primer uso del instrumento de prepago para el acceso de los servicios, esta fecha es automática desde el registro en los sistemas de gestión de red, a partir de esta fecha corre el plazo de liquidación de la tarjeta en caso de comercialización en la modalidad de consignación.  Es un campo de consulta que no puede ser actualizado más que por el uso de la tarjeta en estado activo.");
 aGE("Propietario","Es un texto que identifica al dueńo de una cuenta en el  sistema, compuesto por su identificación y nombre.");
 aGE("Rango de fechas","Es un periodo inclusivo comprendido entre los valores de dos campos tipo fecha.  Cada uno de los límites puede ser capturado directamente o elegido con la herramienta selectora.");
 aGE("Rango de Prepagos","Corresponde a dos campos numéricos que determinan inclusivamente los límites inferior y superior del rango de instrumentos de prepago para un prefijo dado.");
 aGE("Razón de bloqueo","Es un texto descriptivo que no acepta valores nulos e indentifica de forma concisa cada razón por la que una cuenta o login han sido bloqueados, es decir, el estado donde temporalmente su utilización ha sido restringida.");
 aGE("Razón Social","Es el nombre de registro (no comercial) de una empresa (persona jurídica), no será capturado ni desplegado en el caso de personas físicas, sin embargo es mandatorio para las personas jurídicas.");
 aGE("Real Name","Es un texto no estructurado utilizado como nombre de remisión o remitente en los correos enviados con la cuenta de correo asociada a un login.");
 aGE("Referencia","Una referencia es un número o código no estructurado ni validado funcionalmente que establece un ligamen a una codificación externa el sistema, pero que debe ser validada, y constatada manualmente por el capturador de la misma.");
 aGE("Responsable","Indicador de quien es la persona responsable del ítem, es decir donde está.  Corresponde a una lista de posibilidades y la validación sobre ésta mediante una lista de selección.  Por omisión el ítem está en custodia de la empresa.");
 aGE("Restricción del medio","Es el número máximo de minutos de servicio permitidos a un medio particular para acceder los servicios de la empresa para cada período de facturación, al cambiar este los minutos consumidos volverán a contabilizarse.");
 aGE("Roaming","Indicador sobre la factibilidad de esta característica o no. Es un valor booleano (De dos estados posibles) donde una marca equivale a un \"SI\".");
 aGE("Severidad de la inconsistencia","Es una clasificación de la severidad de las inconsistencias de un tipo de inconsistencia determinado.  Corresponde a una escala preestablecida por una lista de valores en el sistema.  A partir de esta se captura, valida y consulta en cada´punto de contacto.");
 aGE("Sobre de acceso","Es un lista de selección que despliega los números de sobre de acceso disponibles a asignar en el contexto actual.");
 aGE("Tarea","Es un nombre de referencia a la incidencia particular de un proceso ejecutado, optativo o programado.");
 aGE("Tarifa básica","Es el precio mínimo y básico para cada ciclo de facturación por parte del cliente adquiriente del producto. Por este precio se incluyen las horas estipuladas en el mismo producto en el campo Horas básicas.  Está expresado en la moneda definida por un valor numérico mayor o igual a cero, no acepta valores nulos.");
 aGE("Teléfono","Es un número telefónico, validado y presentado contra el formato parametrizado para el este.  Una entidad puede tener diferentes números telefónicos, el primario se validará, es decir no contendrá valores nulos, los teléfonos adicionales pueden ser nulos.");
 aGE("Teléfono de conexión","Es el número telefónico desde el cual se realiza la conexión a los sistemas de gestión de red, se reporta por estos para cada evento, obviamente cada evento solo podrá tener un teléfono de referencia.");
 aGE("Teléfono requerido","Indicador que establece la movilidad del producto, en caso de marcar el campo, en cada venta del paquete se solicitará un número de teléfono y se verificará el mismo en la conexión.  Es un campo booleano (de dos estados) donde la marca significa \"SI\".");
 aGE("Tiempo disponible","Son los minutos restantes para un instrumento de prepago, calculado a partir de l tiempo original menos la duración en minutos  de cada sesión.  Es un campo de consulta que no puede ser variado particularmente para un prepago, sino que se descuenta automáticamente en cada conexión.");
 aGE("Tiempo original","Es el tiempo configurado para un instrumento de prepago, se expresa en minutos.  Es un campo de consulta que no puede ser variado particularmente para un prepago.");
 aGE("Tipo de comisión","Clasificación de las diferentes formas de cálculo y pago de comisiones a los Comercializadores.  Se valida contra una lista de valores preestablecida, el proceso de cálculo de comisiones dependerá de este valor para determinar el monto correspondiente.");
 aGE("Tipo de dato","Establece el tipo de dato de un Atributo Extendido.  Los tipos de datos de los Atributos extendidos están predefinidos, de estos dependen la validación e interpretación del valor de captura. La validación de un tipo de dato se realizará contra la lista de valores posibles..");
 aGE("Tipo de envío","Define la forma en que se enviará documentación física al dueńo de una cuenta en relación a esta.  Corresponde a un lista de selección a un catálogo precargado, validando su ingreso contra esta.");
 aGE("Tipo de incidencia","Indica el origen de una incidencia, si esta fue ingresada manualmente o fue producto de un proceso automático del sistema.  Este campo no puede ser editado, se define directamente por el origen de la incidencia y solo es utilizado para efectos de consulta.");
 aGE("Tipo de representante","Clasifica la relación entre una persona física y una jurídica o moral.  La persona física puede ser nacional, extranjero o residente. Esta clasificación se valida contra una lista preestablecida de valores que definen la naturaleza de la representación.");
 aGE("Tipo de Tarifa","Es el nombre del tracto en que se divide la tarifa, sirve como identificador de las divisiones de una Tarifa, el campo no puede tener valores nulos.");
 aGE("Tolerancia de garantía","Es el porcentaje que indica la tolerancia de la garantía del producto anterior en caso de un cambio de paquete hacia este. El valor cero indica que no existe tolerancia y la garantía vigente debe cubrir en su totalidad el valor determinado para este producto. Es un valor numérico mayor o igual a cero.");
 aGE("Unidad de cobro","Unidad en que se expresa el consumo de los eventos a facturar. corresponde a una lista de valores preestablecidos.");
 aGE("Unidades base","Unidades incluidas en el precio base del tipo de tarifa, calculado en cada ciclo de facturación, este valor por omisión es cero, y se valida una cantidad mayor o igual a cero.  Esta unidad está expresada en la unidad de cobro de la Tarifa.");
 aGE("Unidades excedente","Es el precio por unidad excedente de las unidades base definidas para un tipo de tarifa.  Las unidades están definidas por la Unidad de Cobro de la Tarifa y las unidades no cobrables a destajo son las Unidades Base del Tipo de Tarifa.  El porecio estipulado está expresado en la moneda de la Tarifa.  Valida valores numéricos mayores a cero.");
 aGE("Valor del atributo","Es el nombre que identifica el valor de la opción en la lista asociada al tipo de dato \"Lista de valores\". Valida que este valor no sea nulo.");
 aGE("Valoración de incidencia","Establece si la incidencia corresponde a un reconocimeinto o castigo, positiva o negativa respectivamente, a la labor de un agente.");
 aGE("Valores del atributo","Arreglo con valores de selección en el caso de que el Atributo Extendido corresponda con una lista de valores.");
 aGE("Vigencia del prepago","Plazo en días naturales de vigencia del prepago a partir de la fecha de primer uso, preestablecida por la definición del producto (paquete asignado).  Es un campo de consulta que no puede ser modificado particularmente para un instrumento.");
