function fnKeyPress(txtBox, e)
{
  var keycode;
  if (window.event) 
    keycode = window.event.keyCode;
  else if (e) 
    keycode = e.which;
  else 
    return true;

  if (keycode == 13)
    window.event.keyCode = 9;
  else if (((keycode>47) && (keycode<58) ) || (keycode==8))
    return true;
  else if ((keycode==46) && (txtBox.value != "") && (txtBox.value.indexOf(".") == -1))
    return true;
  else 
    return false;
}
function fnKeyDown(txtBox, e)
{
  var keycode;
  if (window.event) 
    keycode = window.event.keyCode;
  else if (e) 
    keycode = e.which;
  else 
    return true;

  var LvarXAlumno = eval(document.frmNotas.chkXAlumno.value);
  var LvarNewCell = txtBox;
  var LvarNewRow = null;
  var LvarTD = txtBox.parentElement;
  var LvarTR = LvarTD.parentElement;
  var LvarTB = LvarTR.parentElement;
  var LvarCol = LvarTD.cellIndex;
  var LvarRow = LvarTR.rowIndex;
  if (keycode == 13)
    if (LvarXAlumno)
    {
      if (LvarCol < LvarTR.cells.length-1)
        LvarNewCell = LvarTR.cells(LvarCol + 1).firstChild;
	  else if (LvarRow < LvarTB.rows.length-1)
      {
        LvarNewRow = LvarTB.rows(LvarRow + 1);
        LvarNewCell = LvarNewRow.cells(0).firstChild;
	  }
	  else
        LvarNewCell = LvarTB.rows(1).cells(0).firstChild;
    }
	else
    {
	  if (LvarRow < LvarTB.rows.length-1)
      {
        LvarNewRow = LvarTB.rows(LvarRow + 1);
        LvarNewCell = LvarNewRow.cells(LvarCol).firstChild;
	  }
      else if (LvarCol < LvarTR.cells.length-1)
      {
        LvarNewRow = LvarTB.rows(1);
        LvarNewCell = LvarNewRow.cells(LvarCol+1).firstChild;
	  }
	  else
      {
        LvarNewRow = LvarTB.rows(1);
        LvarNewCell = LvarNewRow.cells(0).firstChild;
	  }
    }
  else if (keycode == 39)
  { 
    if (LvarCol < LvarTR.cells.length-1)
      LvarNewCell = LvarTR.cells(LvarCol + 1).firstChild;
  }
  else if (keycode == 37)
  { 
    if (LvarCol > 0)
      LvarNewCell = LvarTR.cells(LvarCol - 1).firstChild;
  }
  else if (keycode == 40)
  { 
    if (LvarRow < LvarTB.rows.length-1)
	{
      LvarNewRow = LvarTB.rows(LvarRow + 1);
      LvarNewCell = LvarNewRow.cells(LvarCol).firstChild;
	}
  }
  else if (keycode == 38)
  { 
    if (LvarRow > 1)
	{
      LvarNewRow = LvarTB.rows(LvarRow - 1);
      LvarNewCell = LvarNewRow.cells(LvarCol).firstChild;
	}
  }
  LvarNewCell.focus();
}

function fnBlur(txtBox, e)
{
  if (parseFloat(txtBox.value)>100.0)
  {
    txtBox.select();
    txtBox.focus();
	return false;
  }
  if (txtBox.value != "")
    txtBox.value = Math.round(eval(txtBox.value)*100) / 100;
  txtBox.style.border='0px'
  return true;
}
-->
