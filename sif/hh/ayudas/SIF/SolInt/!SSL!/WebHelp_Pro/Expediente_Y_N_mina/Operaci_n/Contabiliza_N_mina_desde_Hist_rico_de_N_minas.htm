<h1 align="center" class="whs1">Contabiliza Nómina desde Histórico <span style="text-align: center; color: #000080;"><font color=navy >de 
 Nóminas</font></span></h1>

<p class="whs2">Para contabilizar los movimientos generados 
 por una nómina se debe de seleccionar el registro de &nbsp;nómina 
 deseada y hacer un click en el botón<img src="Boton8.jpg" x-maintain-ratio="TRUE" width="129px" height="26px" border="0" class="img_whs3">, para que se generen 
 los movimientos de la planilla en las cuentas contables correspondientes.</p>
