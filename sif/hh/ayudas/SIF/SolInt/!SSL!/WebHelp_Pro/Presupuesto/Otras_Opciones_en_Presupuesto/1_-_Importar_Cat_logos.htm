<h1 align="center" class="whs1">Importar Catálogos</h1>

<p class="whs2">Se selecciona de la lista, 
 el Script que se desea ejecutar y luego se presiona el botón <img src="bSiguiente--.jpg" x-maintain-ratio="TRUE" width="91px" height="19px" border="0" class="img_whs3">:</p>

<p class="whs2">&nbsp;</p>

<p align="center" class="whs4"><img src="ImpCatalog01.jpg" x-maintain-ratio="TRUE" width="720px" height="113px" border="0" class="img_whs5"></p>

<p class="whs2">&nbsp;</p>

<p class="whs2">Posteriormente se debe 
 de presionar el botón <img src="../Formulaci_n_de_Presupuesto/bExaminar.jpg" x-maintain-ratio="TRUE" width="75px" height="20px" border="0" class="img_whs6"> para seleccionar el archivo. Luego
